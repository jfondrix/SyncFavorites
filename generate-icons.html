<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Generate Icons</title></head>
<body>
<p>Generating icons... check your Downloads folder.</p>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function drawIcon(size) {
  canvas.width = size;
  canvas.height = size;

  const r = size * 0.12;

  // Background
  const bg = ctx.createLinearGradient(0, 0, size, size);
  bg.addColorStop(0, '#6366f1');
  bg.addColorStop(1, '#8b5cf6');
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(size - r, 0);
  ctx.quadraticCurveTo(size, 0, size, r);
  ctx.lineTo(size, size - r);
  ctx.quadraticCurveTo(size, size, size - r, size);
  ctx.lineTo(r, size);
  ctx.quadraticCurveTo(0, size, 0, size - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fillStyle = bg;
  ctx.fill();

  // Up arrow
  const cx = size / 2;
  const unit = size * 0.08;
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = size * 0.1;
  ctx.lineCap = 'round';

  // Up arrow (top half)
  ctx.beginPath();
  ctx.moveTo(cx, size * 0.18);
  ctx.lineTo(cx, size * 0.48);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(cx - unit * 1.2, size * 0.30);
  ctx.lineTo(cx, size * 0.18);
  ctx.lineTo(cx + unit * 1.2, size * 0.30);
  ctx.stroke();

  // Down arrow (bottom half)
  ctx.beginPath();
  ctx.moveTo(cx, size * 0.52);
  ctx.lineTo(cx, size * 0.82);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(cx - unit * 1.2, size * 0.70);
  ctx.lineTo(cx, size * 0.82);
  ctx.lineTo(cx + unit * 1.2, size * 0.70);
  ctx.stroke();
}

function download(size) {
  drawIcon(size);
  const a = document.createElement('a');
  a.download = `icon${size}.png`;
  a.href = canvas.toDataURL('image/png');
  a.click();
}

// Small delay between downloads
setTimeout(() => download(16),  200);
setTimeout(() => download(48),  600);
setTimeout(() => download(128), 1000);
</script>
</body>
</html>
