<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { width: 320px; font-family: Arial, sans-serif; padding: 10px; }
    input { width: 100%; margin-bottom: 8px; padding: 6px; box-sizing: border-box; }
    button { width: 100%; padding: 8px; margin-bottom: 6px; cursor: pointer; }
    #status { margin-top: 8px; font-weight: bold; font-size: 13px; }
  </style>
</head>
<body>
  <h2>Edge Profile Sync (VPS)</h2>
  <input type="text" id="vpsUrl" placeholder="http://your-vps-ip:3000">
  <input type="password" id="syncToken" placeholder="Your Custom Secret Token">
  <button id="saveConfig">Save & Link VPS</button>
  <hr>
  <button id="syncUp">Upload Bookmarks</button>
  <button id="syncDown">Download Bookmarks</button>
  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
