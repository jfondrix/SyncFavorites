<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>SyncFav</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      padding: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .logo {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 600;
      color: #f1f5f9;
    }

    .header .version {
      font-size: 11px;
      color: #64748b;
      margin-left: auto;
    }

    .section {
      background: #1e2130;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 12px;
      border: 1px solid #2d3148;
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #64748b;
      margin-bottom: 10px;
    }

    .input-group {
      position: relative;
      margin-bottom: 8px;
    }

    .input-group:last-child { margin-bottom: 0; }

    .input-group label {
      display: block;
      font-size: 11px;
      color: #94a3b8;
      margin-bottom: 4px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 6px;
      padding: 7px 10px;
      font-size: 13px;
      color: #e2e8f0;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus { border-color: #6366f1; }

    .btn {
      width: 100%;
      padding: 8px 12px;
      border-radius: 7px;
      border: none;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }

    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-primary {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
      margin-bottom: 8px;
    }

    .btn-upload {
      background: #1d4ed8;
      color: #fff;
      margin-bottom: 8px;
    }

    .btn-download {
      background: #065f46;
      color: #fff;
    }

    .status {
      margin-top: 12px;
      padding: 8px 10px;
      border-radius: 7px;
      font-size: 12px;
      font-weight: 500;
      display: none;
    }

    .status.success { background: #064e3b; color: #6ee7b7; display: block; }
    .status.error   { background: #7f1d1d; color: #fca5a5; display: block; }
    .status.info    { background: #1e3a5f; color: #93c5fd; display: block; }

    .dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #374151;
      margin-right: 6px;
      vertical-align: middle;
    }

    .dot.connected { background: #10b981; }

    .config-status {
      font-size: 12px;
      color: #64748b;
      display: flex;
      align-items: center;
      margin-top: 8px;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">⇅</div>
    <h1>SyncFav</h1>
    <span class="version">v1.0</span>
  </div>

  <div class="section">
    <div class="section-title">Server Configuration</div>
    <div class="input-group">
      <label>VPS URL</label>
      <input type="text" id="vpsUrl" placeholder="https://your-vps.com:3000">
    </div>
    <div class="input-group">
      <label>Secret Token</label>
      <input type="password" id="syncToken" placeholder="your-secret-token">
    </div>
    <div class="input-group">
      <label>Profile Name</label>
      <input type="text" id="profileName" placeholder="e.g. work, personal">
    </div>
    <button class="btn btn-primary" id="saveConfig">Save Configuration</button>
    <div class="config-status">
      <span class="dot" id="connDot"></span>
      <span id="connLabel">Not configured</span>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Sync Bookmarks</div>
    <button class="btn btn-upload" id="syncUp">↑ Upload to Server</button>
    <button class="btn btn-download" id="syncDown">↓ Download from Server</button>
  </div>

  <div class="status" id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
